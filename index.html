<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sales Dashboard</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --ink: #1a1d21;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #2563eb;
      --pos: #15803d;
      --neg: #b91c1c;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14171a;
        --card: #1e2227;
        --ink: #eceff2;
        --muted: #9aa4b2;
        --line: #2c313a;
        --accent: #60a5fa;
        --pos: #4ade80;
        --neg: #f87171;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 32px;
      font: 15px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      max-width: 960px;
      margin: 0 auto 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      height: 52px;
      width: auto;
      border-radius: 8px;
      display: block;
    }

    h1 {
      font-size: 20px;
      margin: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    button {
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--ink);
      padding: 8px 14px;
      border-radius: 8px;
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    button:hover {
      filter: brightness(0.97);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 18px 20px;
    }

    .card .label {
      color: var(--muted);
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .card .value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 6px;
    }

    .card .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 28px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      overflow: hidden;
    }

    th,
    td {
      text-align: left;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
    }

    th {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    td.num,
    th.num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tr:last-child td {
      border-bottom: none;
    }

    @media print {
      body {
        padding: 0;
        background: #fff;
        color: #000;
      }

      .actions {
        display: none;
      }

      .card,
      table {
        border-color: #ccc;
      }
    }
  </style>
</head>

      <div>
        <h1 id="title">Sales Dashboard</h1>
        <div class="sub" id="subtitle"></div>
      </div>
    </div>
    <div class="actions">
      <button class="primary" onclick="exportExcel()">Export to Excel</button>
      <button onclick="window.print()">Export to PDF</button>
    </div>
  </header>

  <main>
    <section class="cards" id="cards"></section>
    <table id="detail">
      <thead>
        <tr>
          <th>Period</th>
          <th class="num">Sales</th>
          <th class="num">Orders</th>
          <th class="num">Avg Order Value</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <script>
    // ─────────────────────────────────────────────────────────────
    //  EDIT THIS BLOCK — drop in your real figures (or wire it to a
    //  data file later). Values are plain numbers; formatting is
    //  handled below.
    // ─────────────────────────────────────────────────────────────
    const DATA = {
      outlet: "My Outlet",
      currency: "₹",
      asOf: "2026-07-05",           // the date this snapshot represents
      periods: [
        { key: "prevDay", label: "Previous Day", sales: 18450, orders: 62 },
        { key: "mtd", label: "Month to Date", sales: 92300, orders: 318 },
        { key: "prevMonth", label: "Previous Month", sales: 415600, orders: 1487 },
      ],
    };
    // ─────────────────────────────────────────────────────────────

    const fmtMoney = n => DATA.currency + n.toLocaleString("en-IN");
    const fmtNum = n => n.toLocaleString("en-IN");
    const aov = p => p.orders ? Math.round(p.sales / p.orders) : 0;

    function render() {
      document.getElementById("title").textContent = DATA.outlet + " — Sales Dashboard";
      document.getElementById("subtitle").textContent = "As of " + DATA.asOf;

      document.getElementById("cards").innerHTML = DATA.periods.map(p => `
    <div class="card">
      <div class="label">${p.label}</div>
      <div class="value">${fmtMoney(p.sales)}</div>
      <div class="meta">${fmtNum(p.orders)} orders · AOV ${fmtMoney(aov(p))}</div>
    </div>`).join("");

      document.querySelector("#detail tbody").innerHTML = DATA.periods.map(p => `
    <tr>
      <td>${p.label}</td>
      <td class="num">${fmtMoney(p.sales)}</td>
      <td class="num">${fmtNum(p.orders)}</td>
      <td class="num">${fmtMoney(aov(p))}</td>
    </tr>`).join("");
    }

    // Capture WHATEVER is currently on the dashboard (read live from the DOM,
    // not from DATA) and download it as a file Excel opens natively.
    function exportExcel() {
      const esc = s => String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");

      // 1) Header block — title + subtitle exactly as shown.
      const title = document.getElementById("title").textContent;
      const subtitle = document.getElementById("subtitle").textContent;

      // 2) Metric cards currently rendered.
      const cardRows = [...document.querySelectorAll("#cards .card")].map(c =>
        `<tr><td>${esc(c.querySelector(".label").textContent)}</td>` +
        `<td>${esc(c.querySelector(".value").textContent)}</td>` +
        `<td>${esc(c.querySelector(".meta").textContent)}</td></tr>`
      ).join("");

      // 3) The detail table exactly as rendered (headers + every row).
      const tableRows = [...document.querySelectorAll("#detail tr")].map(tr =>
        "<tr>" + [...tr.children].map(cell =>
          `<${cell.tagName === "TH" ? "th" : "td"}>${esc(cell.textContent)}</${cell.tagName === "TH" ? "th" : "td"}>`
        ).join("") + "</tr>"
      ).join("");

      const html =
        `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8">
     <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
     <x:Name>Dashboard</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
     </x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head>
     <body>
     <table border="1">
       <tr><th colspan="3">${esc(title)}</th></tr>
       <tr><td colspan="3">${esc(subtitle)}</td></tr>
       <tr></tr>
       <tr><th>Metric</th><th>Value</th><th>Detail</th></tr>
       ${cardRows}
       <tr></tr>
       ${tableRows}
     </table></body></html>`;

      const stamp = (DATA.asOf || "export").replace(/[^0-9A-Za-z_-]/g, "");
      const blob = new Blob([html], { type: "application/vnd.ms-excel" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `dashboard_${stamp}.xls`;
      a.click();
      URL.revokeObjectURL(url);
    }

    render();
  </script>
</body>

</html>
