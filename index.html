<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sales Dashboard — Plateful Consulting</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --card: #ffffff;
      --text: #16181d;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #fc8019;      /* Swiggy orange */
      --accent-soft: #fff4ea;
      --head: #1f2430;
      --pos: #128a3c;
      --neg: #c0392b;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 8px 24px rgba(0,0,0,.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #14171a;
        --card: #1c2026;
        --text: #e7e9ee;
        --muted: #9aa3af;
        --border: #2b313a;
        --accent: #fc8019;
        --accent-soft: #2a2016;
        --head: #232936;
        --pos: #35c46b;
        --neg: #ef6a5a;
        --shadow: 0 1px 3px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 24px 20px 56px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 22px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .logo { height: 52px; width: auto; border-radius: 8px; display: block; }
    h1 { font-size: 20px; margin: 0; letter-spacing: -.01em; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button {
      font: inherit; cursor: pointer; border-radius: 8px;
      border: 1px solid var(--border); background: var(--card); color: var(--text);
      padding: 9px 14px; font-size: 13px; font-weight: 600;
      transition: transform .05s ease, box-shadow .15s ease;
    }
    button:hover { box-shadow: var(--shadow); }
    button:active { transform: translateY(1px); }
    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; font-weight: 700; letter-spacing: .04em; text-transform: uppercase;
      padding: 4px 9px; border-radius: 999px; border: 1px solid var(--border);
    }
    .badge .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .badge.live { color: var(--pos); border-color: color-mix(in srgb, var(--pos) 40%, transparent); }
    .badge.live .dot { background: var(--pos); }
    .badge.preview { color: var(--accent); border-color: color-mix(in srgb, var(--accent) 45%, transparent); }
    .badge.preview .dot { background: var(--accent); }

    .notice {
      background: var(--accent-soft); border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
      color: var(--text); border-radius: 10px; padding: 12px 14px; font-size: 13px;
      margin-bottom: 18px; line-height: 1.5;
    }
    .notice b { color: var(--accent); }

    /* summary cards */
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-bottom: 20px; }
    @media (max-width: 640px) { .cards { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 18px; box-shadow: var(--shadow);
    }
    .card .label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .card .value { font-size: 24px; font-weight: 700; margin-top: 6px; letter-spacing: -.02em; }
    .card .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* table */
    .tablewrap { background: var(--card); border: 1px solid var(--border); border-radius: 12px; box-shadow: var(--shadow); overflow: hidden; }
    .scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead th {
      background: var(--head); color: #fff; text-align: left; font-weight: 600;
      padding: 13px 16px; white-space: nowrap; font-size: 12.5px; letter-spacing: .02em;
    }
    thead th.num { text-align: right; }
    tbody td { padding: 12px 16px; border-top: 1px solid var(--border); white-space: nowrap; }
    tbody td.num { text-align: right; font-variant-numeric: tabular-nums; }
    tbody tr:hover td { background: color-mix(in srgb, var(--accent) 6%, transparent); }
    .rest { font-weight: 600; }
    .locality { display: block; font-weight: 400; font-size: 12px; color: var(--muted); margin-top: 2px; }
    td.na { color: var(--muted); }
    tfoot td {
      padding: 13px 16px; border-top: 2px solid var(--border); font-weight: 700;
      background: color-mix(in srgb, var(--accent) 5%, transparent);
    }
    tfoot td.num { text-align: right; font-variant-numeric: tabular-nums; }

    .state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 14px; }
    footer { margin-top: 22px; font-size: 12px; color: var(--muted); text-align: center; }
    a { color: var(--accent); }
  </style>
</head>

              <th class="num">Previous Month</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="4" class="state">Loading…</td></tr>
          </tbody>
          <tfoot id="tfoot"></tfoot>
        </table>
      </div>
    </div>

    <footer>
      Plateful Consulting · Swiggy Sales Dashboard · data source:
      <span id="srcNote">preview sample</span>
    </footer>
  </div>

  <script>
  // ══════════════════════════════════════════════════════════════════════
  //  CONFIG — fill these in to pull live data from Supabase.
  //  Leave SUPABASE_URL blank to show the sample-data PREVIEW.
  //  Use the *anon* (public) key, NOT the service key — the service key must
  //  never live in a public page. Anon access requires a read RLS policy on
  //  the table (SELECT for role `anon`).
  // ══════════════════════════════════════════════════════════════════════
  const SUPABASE_URL      = "";              // e.g. "https://abcdxyz.supabase.co"
  const SUPABASE_ANON_KEY = "";              // public anon key
  const TABLE             = "swiggy_metrics";
  const SALES_METRIC      = "Net Sales";
  const CURRENCY          = "₹";
  const PERIOD = { prevDay: "Yesterday", mtd: "This Month" };  // period labels used by the scraper
  // ══════════════════════════════════════════════════════════════════════

  // Sample preview data (clearly fake) so the layout is visible before Supabase is wired.
  const SAMPLE = {
    asOf: "sample data — not live",
    rows: [
      { rid: "1", name: "Casa Dona",        locality: "Calangute",   prevDay: 18450,  mtd: 92300,  prevMonth: 415600 },
      { rid: "2", name: "KOSTRA",           locality: "Panjim",      prevDay: 12240,  mtd: 71880,  prevMonth: 338900 },
      { rid: "3", name: "The Fisherman's",  locality: "Candolim",    prevDay: 9870,   mtd: 54120,  prevMonth: 249750 },
      { rid: "4", name: "Spice Route",      locality: "Mapusa",      prevDay: 7310,   mtd: 43990,  prevMonth: 201400 },
    ],
  };

  const fmtMoney = n => (n === null || n === undefined || Number.isNaN(n))
    ? null : CURRENCY + Math.round(n).toLocaleString("en-IN");
  const cell = n => { const s = fmtMoney(n); return s === null
    ? '<td class="num na">—</td>' : `<td class="num">${s}</td>`; };

  let CURRENT = { asOf: "", rows: [] };  // what's rendered right now (used by export)

  function render(data, opts) {
    CURRENT = data;
    const preview = !!(opts && opts.preview);

    document.getElementById("subtitle").textContent = "As of " + data.asOf;
    document.getElementById("srcText").textContent = preview ? "Preview" : "Live";
    const badge = document.getElementById("srcBadge");
    badge.className = "badge " + (preview ? "preview" : "live");
    document.getElementById("srcNote").textContent = preview
      ? "preview sample (Supabase not configured)" : "Supabase · " + TABLE;

    if (preview) {
      const n = document.getElementById("notice");
      n.style.display = "";
      n.innerHTML = "<b>Preview mode.</b> These are placeholder numbers. "
        + "Add your <b>Supabase URL</b> and <b>anon key</b> in the CONFIG block at the top of this file "
        + "(and a read policy on <code>" + TABLE + "</code>) to load live sales.";
    }

    // summary cards = totals across all restaurants
    const tot = data.rows.reduce((a, r) => ({
      prevDay: a.prevDay + (r.prevDay || 0),
      mtd: a.mtd + (r.mtd || 0),
      prevMonth: a.prevMonth + (r.prevMonth || 0),
    }), { prevDay: 0, mtd: 0, prevMonth: 0 });

    document.getElementById("cards").innerHTML = [
      ["Previous Day", tot.prevDay, data.rows.length + " outlets"],
      ["Month to Date", tot.mtd, "running total"],
      ["Previous Month", tot.prevMonth, "final total"],
    ].map(([label, val, meta]) => `
      <div class="card">
        <div class="label">${label}</div>
        <div class="value">${fmtMoney(val) || "—"}</div>
        <div class="meta">${meta}</div>
      </div>`).join("");

    // table
    const tbody = document.getElementById("tbody");
    if (!data.rows.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="state">No data found.</td></tr>';
      document.getElementById("tfoot").innerHTML = "";
      return;
    }
    tbody.innerHTML = data.rows.map(r => `
      <tr>
        <td><span class="rest">${escapeHtml(r.name || "—")}</span>${
          r.locality ? `<span class="locality">${escapeHtml(r.locality)}</span>` : ""}</td>
        ${cell(r.prevDay)}${cell(r.mtd)}${cell(r.prevMonth)}
      </tr>`).join("");

    document.getElementById("tfoot").innerHTML = `
      <tr><td>Total (${data.rows.length})</td>
        ${cell(tot.prevDay)}${cell(tot.mtd)}${cell(tot.prevMonth)}</tr>`;
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // ── Live data from Supabase ────────────────────────────────────────────
  async function loadLive() {
    // Pull all Net Sales rows (all periods, all history), newest first.
    const q = new URLSearchParams({
      select: "rid,outlet_name,locality,period,value,captured_on,no_data",
      metric: "eq." + SALES_METRIC,
      order: "captured_on.desc",
    });
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?${q}`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: "Bearer " + SUPABASE_ANON_KEY },
    });
    if (!res.ok) throw new Error("Supabase " + res.status + " — " + (await res.text()).slice(0, 200));
    const raw = await res.json();

    // Previous calendar month window (IST-agnostic; captured_on is a date string).
    const now = new Date();
    const firstThis = new Date(now.getFullYear(), now.getMonth(), 1);
    const prevMonthKey = `${firstThis.getFullYear()}-${String(firstThis.getMonth() === 0 ? 12 : firstThis.getMonth()).padStart(2, "0")}`;

    const byRid = new Map();
    let latestCap = "";
    for (const row of raw) {
      if (row.no_data) continue;
      if (row.captured_on > latestCap) latestCap = row.captured_on;
      const g = byRid.get(row.rid) || { rid: row.rid, name: row.outlet_name, locality: row.locality,
        prevDay: null, mtd: null, prevMonth: null, _seen: {} };
      g.name = g.name || row.outlet_name; g.locality = g.locality || row.locality;

      // rows are newest-first, so the FIRST time we see a (period) it's the latest snapshot.
      if (row.period === PERIOD.prevDay && g._seen.prevDay === undefined) {
        g.prevDay = num(row.value); g._seen.prevDay = 1;
      }
      if (row.period === PERIOD.mtd) {
        if (g._seen.mtd === undefined) { g.mtd = num(row.value); g._seen.mtd = 1; }
        // Previous month = last "This Month" snapshot dated in the previous calendar month.
        if (g._seen.prevMonth === undefined && String(row.captured_on).slice(0, 7) === prevMonthKey) {
          g.prevMonth = num(row.value); g._seen.prevMonth = 1;
        }
      }
      byRid.set(row.rid, g);
    }
    const rows = [...byRid.values()].sort((a, b) => (b.mtd || 0) - (a.mtd || 0));
    return { asOf: latestCap || new Date().toISOString().slice(0, 10), rows };
  }
  const num = v => (v === null || v === undefined || v === "") ? null : Number(v);

  // ── Export currently-rendered table to an .xls Excel opens natively ─────
  function exportExcel() {
    const esc = escapeHtml;
    const rowsHtml = CURRENT.rows.map(r =>
      `<tr><td>${esc(r.name || "")}${r.locality ? " — " + esc(r.locality) : ""}</td>` +
      `<td>${r.prevDay ?? ""}</td><td>${r.mtd ?? ""}</td><td>${r.prevMonth ?? ""}</td></tr>`
    ).join("");
    const t = CURRENT.rows.reduce((a, r) => ({
      pd: a.pd + (r.prevDay || 0), m: a.m + (r.mtd || 0), pm: a.pm + (r.prevMonth || 0),
    }), { pd: 0, m: 0, pm: 0 });
    const html =
      `<html xmlns:x="urn:schemas-microsoft-com:office:excel"><head><meta charset="utf-8">
       <!--[if gte mso 9]><xml><x:ExcelWorkbook><x:ExcelWorksheets><x:ExcelWorksheet>
       <x:Name>Sales</x:Name><x:WorksheetOptions><x:DisplayGridlines/></x:WorksheetOptions>
       </x:ExcelWorksheet></x:ExcelWorksheets></x:ExcelWorkbook></xml><![endif]--></head><body>
       <table border="1">
         <tr><th colspan="4">Swiggy Sales Dashboard — as of ${esc(CURRENT.asOf)}</th></tr>
         <tr><th>Restaurant</th><th>Previous Day Sales</th><th>Month to Date (MTD)</th><th>Previous Month</th></tr>
         ${rowsHtml}
         <tr><td><b>Total</b></td><td><b>${t.pd}</b></td><td><b>${t.m}</b></td><td><b>${t.pm}</b></td></tr>
       </table></body></html>`;
    const blob = new Blob([html], { type: "application/vnd.ms-excel" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `swiggy_sales_${String(CURRENT.asOf).replace(/[^0-9A-Za-z_-]/g, "")}.xls`;
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── boot ────────────────────────────────────────────────────────────────
  (async function init() {
    if (!SUPABASE_URL || !SUPABASE_ANON_KEY) { render(SAMPLE, { preview: true }); return; }
    try {
      const data = await loadLive();
      render(data, { preview: false });
    } catch (e) {
      const n = document.getElementById("notice");
      n.style.display = "";
      n.innerHTML = "<b>Couldn't load live data.</b> " + escapeHtml(e.message)
        + " — showing sample preview instead.";
      render(SAMPLE, { preview: true });
    }
  })();
  </script>
</body>
</html>
