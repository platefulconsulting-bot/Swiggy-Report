name: swiggy-scrape

on:
  workflow_dispatch:        # manual "Run workflow" button
  schedule:
    - cron: "30 2 * * *"  # 08:00 IST daily (02:30 UTC) — uncomment to automate

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 330    # headroom for a large fleet (~2.5h for 50 accounts)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright + Chromium
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          # ---- credentials (use SWIGGY_ACCOUNTS for multi-account; the two below are the single-account fallback) ----
          SWIGGY_ACCOUNTS: ${{ secrets.SWIGGY_ACCOUNTS }}
          SWIGGY_USER: ${{ secrets.SWIGGY_USER }}
          SWIGGY_PASS: ${{ secrets.SWIGGY_PASS }}
          # ---- Supabase ----
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # HEADLESS: "true"
          # SHOT_DEBUG: "1"   # screenshot every account (default: first only)
        run: python swiggy_extract.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: swiggy-scrape-output
          path: swiggy_probe_out/
